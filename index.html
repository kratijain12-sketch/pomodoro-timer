<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  width:320px;
  height:420px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f7f7f7;
}

.timer-box{
  width:300px;
  padding:20px;
  border-radius:20px;
  text-align:center;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.timer-circle{
  position:relative;
  width:220px;
  height:220px;
  margin:auto;
}

svg{
  transform:rotate(-90deg);
}

circle{
  fill:none;
  stroke-width:10;
}

.bg{
  stroke:#ddd;
}

.progress{
  stroke:#ff6b9d;
  stroke-linecap:round;
}

.time{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:35px;
  font-weight:bold;
}

input{
  margin-top:20px;
  width:100px;
  padding:8px;
  text-align:center;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="timer-box">
  <div class="timer-circle">
    <svg width="220" height="220">
      <circle class="bg" cx="110" cy="110" r="90"></circle>
      <circle id="progress" class="progress" cx="110" cy="110" r="90"></circle>
    </svg>
    <div id="time" class="time">00:00</div>
  </div>

  <input id="minutes" type="number" placeholder="Min">

  <div>
    <button id="setBtn">Set</button>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  let total = 0;
  let left = 0;
  let timer = null;

  const timeEl = document.getElementById("time");
  const progress = document.getElementById("progress");
  const radius = 90;
  const circumference = 2 * Math.PI * radius;

  progress.style.strokeDasharray = circumference;
  progress.style.strokeDashoffset = circumference;

  function update() {
    let mins = Math.floor(left / 60);
    let secs = left % 60;

    timeEl.textContent =
      String(mins).padStart(2,"0") + ":" +
      String(secs).padStart(2,"0");

    if(total > 0){
      let offset = circumference - (left / total) * circumference;
      progress.style.strokeDashoffset = offset;
    }
  }

  document.getElementById("setBtn").onclick = () => {
    const mins = parseInt(document.getElementById("minutes").value);

    if(!mins || mins <= 0) return;

    total = mins * 60;
    left = total;
    update();
  };

  document.getElementById("startBtn").onclick = () => {
    if(timer || left <= 0) return;

    timer = setInterval(() => {
      left--;
      update();

      if(left <= 0){
        clearInterval(timer);
        timer = null;
        alert("Done ✨");
      }
    },1000);
  };

  document.getElementById("pauseBtn").onclick = () => {
    clearInterval(timer);
    timer = null;
  };

  document.getElementById("resetBtn").onclick = () => {
    clearInterval(timer);
    timer = null;
    left = total;
    update();
  };
});
</script>

</body>
</html>
