<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  width: 340px;
  height: 430px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: transparent;
}

.timer-widget {
  width: 320px;
  padding: 20px;
  border-radius: 25px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(15px);
  text-align: center;
}

.timer-circle {
  position: relative;
  width: 220px;
  height: 220px;
  margin: auto;
}

svg {
  width: 220px;
  height: 220px;
  transform: rotate(-90deg);
}

.bg-ring {
  fill: none;
  stroke: rgba(255,255,255,0.3);
  stroke-width: 10;
}

.progress-ring {
  fill: none;
  stroke: #ff6b9d;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}

.timer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2.3rem;
  font-weight: bold;
}

input {
  margin-top: 20px;
  width: 100px;
  padding: 8px;
  border: none;
  border-radius: 10px;
  text-align: center;
}

button {
  margin: 8px 4px;
  padding: 8px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.sessions {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="timer-widget">
  <div class="timer-circle">
    <svg>
      <circle class="bg-ring" cx="110" cy="110" r="90"></circle>
      <circle class="progress-ring" cx="110" cy="110" r="90" id="progress"></circle>
    </svg>
    <div class="timer" id="timer">00:00</div>
  </div>

  <input type="number" id="minutesInput" placeholder="Minutes">

  <div>
    <button onclick="setTime()">Set</button>
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <div class="sessions">
    Sessions: <span id="sessions">0</span>
  </div>
</div>

<script>
let timerInterval;
let totalSeconds = 0;
let remainingSeconds = 0;
let isRunning = false;
let sessions = 0;

const timerDisplay = document.getElementById("timer");
const progressRing = document.getElementById("progress");
const sessionsDisplay = document.getElementById("sessions");

const radius = 90;
const circumference = 2 * Math.PI * radius;

progressRing.style.strokeDasharray = circumference;
progressRing.style.strokeDashoffset = circumference;

function setTime() {
  const minutes = parseInt(document.getElementById("minutesInput").value);

  if (isNaN(minutes) || minutes <= 0) {
    alert("Please enter valid minutes");
    return;
  }

  totalSeconds = minutes * 60;
  remainingSeconds = totalSeconds;
  updateDisplay();
}

function updateDisplay() {
  const mins = Math.floor(remainingSeconds / 60);
  const secs = remainingSeconds % 60;

  timerDisplay.textContent =
    `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;

  const progress = remainingSeconds / totalSeconds;
  progressRing.style.strokeDashoffset =
    circumference * (1 - progress);
}

function startTimer() {
  if (isRunning || remainingSeconds <= 0) return;

  isRunning = true;

  timerInterval = setInterval(() => {
    remainingSeconds--;
    updateDisplay();

    if (remainingSeconds <= 0) {
      clearInterval(timerInterval);
      isRunning = false;
      sessions++;
      sessionsDisplay.textContent = sessions;
      alert("Pomodoro Complete ✨");
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  isRunning = false;
}

function resetTimer() {
  clearInterval(timerInterval);
  isRunning = false;
  remainingSeconds = totalSeconds;
  updateDisplay();
}
</script>

</body>
</html>
