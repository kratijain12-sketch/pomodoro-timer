<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Study Timer ✨</h1>

  <div class="timer-circle">
    <svg width="320" height="320">
      <circle class="bg-ring" cx="160" cy="160" r="130"></circle>
      <circle class="progress-ring" cx="160" cy="160" r="130" id="progress"></circle>
    </svg>

    <div class="timer" id="timer">00:00</div>
  </div>

  <div class="time-input">
    <input type="number" id="customMinutes" placeholder="Enter minutes">
    <button onclick="setCustomTime()">Set</button>
  </div>

  <div class="controls">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

  <p>Completed Sessions: <span id="sessions">0</span></p>
</div>

<script src="script.js"></script>
</body>
</html>
